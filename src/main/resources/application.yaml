spring:
  application:
    name: restaurant

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=restaurant;encrypt=true;trustServerCertificate=true
    username: sa
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # "[format_sql]": true
    database-platform: org.hibernate.dialect.SQLServerDialect

jwt:
  secret: 0123456789abcdef0123456789abcdef
  access-token-expiration: 900000 # 15 phút
  refresh-expiration: 259200000 # 3 ngày
  cookie-secure: false
