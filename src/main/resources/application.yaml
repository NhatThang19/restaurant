spring:
  application:
    name: restaurant

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=restaurant;encrypt=true;trustServerCertificate=true
    username: sa
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
    database-platform: org.hibernate.dialect.SQLServerDialect
